{% extends "base.html" %}
{% block title %}Student Login — SWC Election{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-icon">🗳️</div>
      <h1>Student Login</h1>
      <p>Enter your credentials to access the election portal</p>
    </div>

    <form method="POST" action="{{ url_for('login') }}">
      <div class="form-group">
        <label for="roll_number">Roll Number</label>
        <input type="text" id="roll_number" name="roll_number"
               placeholder="e.g. CS22001" required autocomplete="username" />
      </div>

      <div class="form-group">
        <label for="email">Registered Email</label>
        <input type="email" id="email" name="email"
               placeholder="youremail@college.edu" required autocomplete="email" />
      </div>

      <button type="submit" class="btn btn-primary btn-full">
        Send OTP &rarr;
      </button>
    </form>

    <div class="auth-divider"><span>New to the platform?</span></div>

    <a href="{{ url_for('signup') }}" class="btn btn-outline btn-full">
      📋 Register as Student
    </a>

    <p class="auth-footer-link">
      <a href="{{ url_for('results') }}">📊 View Election Results</a>
    </p>
  </div>
</div>
{% endblock %}
